<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eğitim Merkezi - Oyun Dünyası</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================================================
           🎨 GÖZ YORMAYAN PREMIUM NEON KOYU TEMA (CSS)
           ========================================================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0F0F1E 0%, #13132B 50%, #0B0B1A 100%);
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Başlık Alanı */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #00D2FF; /* Neon turkuaz rengi */
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        header p {
            color: #8E8EAF;
            font-size: 1.1rem;
        }

        /* 📊 Oyun Kartları Grid Düzeni */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            padding: 10px;
        }

        /* 🎮 Oyun Kartı Tasarımı */
        .game-card {
            background: #16162E;
            border: 1px solid #2E2E5C;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease-in-out;
            position: relative;
            overflow: hidden;
        }

        /* Hover durumunda kartın etrafında turkuaz neon parlasın */
        .game-card:hover {
            transform: translateY(-8px);
            border-color: #00D2FF;
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.15);
        }

        /* İkon Alanı */
        .game-icon-container {
            width: 90px;
            height: 90px;
            background: #1E1E38;
            border: 2px dashed #2E2E5C;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .game-card:hover .game-icon-container {
            border-color: #00D2FF;
            background: rgba(0, 210, 255, 0.05);
        }

        .game-icon-container i {
            font-size: 2.2rem;
            color: #8E8EAF;
            transition: color 0.3s ease;
        }

        .game-card:hover .game-icon-container i {
            color: #00D2FF;
        }

        /* Oyun Adı */
        .game-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #FFFFFF;
            margin-bottom: 12px;
        }

        /* Oyun Açıklaması */
        .game-desc {
            font-size: 0.9rem;
            color: #8E8EAF;
            line-height: 1.5;
            margin-bottom: 25px;
            flex-grow: 1; /* Butonları aynı çizgide hizalar kanka */
        }

        /* Oyna Butonu */
        .play-btn {
            background: #00D2FF;
            color: #0B0B1A;
            border: none;
            padding: 12px 35px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            width: 100%;
            letter-spacing: 1px;
            transition: all 0.2s ease-in-out;
            display: inline-block;
            text-transform: uppercase;
        }

        .play-btn:hover {
            background: #33E0FF;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        .play-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <header>
        <h1>Eğitim Merkezi Oyunları</h1>
        <p>Eğlenirken öğrenmeye hazır mısın? İstediğin oyunu seç ve hemen başla!</p>
    </header>

    <main class="games-grid" id="gamesContainer">
        </main>

    <script>
        // =========================================================================
        // ⚙️ DINAMIK OYUN LİSTESİ (Yarın yeni oyun eklerken burayı kullan kanka)
        // =========================================================================
        const oyunlar = [
            {
                id: "impostor_game",
                isim: "Impostor Game",
                aciklama: "Arkadaşlarınla birlikte gizli kelimeyi bulmaya çalış, aranızdaki imposter(lar)ı ayıkla!",
                // Sunucu üzerinden erişeceğimiz oyun adresi:
                alt_yol: "/oyunlar/impostor_game/web/index.html",
                ikon_class: "fa-solid fa-user-secret"
            }
        ];

        // Kartları ekrana çizen fonksiyon
        function renderGames() {
            const container = document.getElementById("gamesContainer");
            container.innerHTML = ""; 

            oyunlar.forEach(oyun => {
                const card = document.createElement("div");
                card.className = "game-card";
                
                // window.location.origin kullanarak port veya domain değişikliklerini dinamik algılar kanka
                const oyunGidisLinki = window.location.origin + oyun.alt_yol;

                card.innerHTML = `
                    <div class="game-icon-container">
                        <i class="${oyun.ikon_class}"></i>
                    </div>
                    <h2 class="game-title">${oyun.isim}</h2>
                    <p class="game-desc">${oyun.aciklama}</p>
                    <a href="${oyunGidisLinki}" target="_blank" class="play-btn">Oyna</a>
                `;
                
                container.appendChild(card);
            });
        }

        // Sayfa yüklendiğinde oyunları çiz
        document.addEventListener("DOMContentLoaded", renderGames);
    </script>
</body>
</html>
